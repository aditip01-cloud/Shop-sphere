<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="design.css">
    <title>Discovering Clothes</title>
</head>
<body>
    <p class="enter">Enter the Fashion World</p>
    <div class="elec-grid">
        <div class="elecitem1">
            <img src="PICTURES/TOP_IMAGE.jpg" alt="Laptops">
            <p>Item : Tops</p>
            <p>Price : ₹599</p>
            <p>Delivery within two days</p>
            <button class="cart">Add to Cart</button>
            <button class="remove">Remove from the cart</button>
        </div>
        <div class="elecitem2">
            <img src="PICTURES/JEANS.webp" alt="Phones">
            <p>Item : Jeans</p>
            <p>Price : ₹1299</p>
            <p>Delivery within two days</p>
            <button class="cart">Add to Cart</button>
            <button class="remove">Remove from the cart</button>
        </div>
        <div class="elecitem3">
            <img src="PICTURES/SHIRT_IMAGE.jpg" alt="Tablets">
            <p>Item : T-Shirt</p>
            <p>Price : ₹499</p>
            <p>Delivery within two days</p>
            <button class="cart">Add to Cart</button>
            <button class="remove">Remove from the cart</button>
        </div>
        <div class="elecitem4">
            <img src="PICTURES/FROCK_IMAGE.avif" alt="Headphones">
            <p>Item : Frock</p>
            <p>Price : ₹899</p>
            <p>Delivery within two days</p>
            <button class="cart">Add to Cart</button>
            <button class="remove">Remove from the cart</button>
        </div>
        <div class="elecitem5">
            <img src="PICTURES/SAREE_IMAGE.jpg" alt="TV">
            <p>Item : Saree</p>
            <p>Price : ₹2499</p>
            <p>Delivery within two days</p>
            <button class="cart">Add to Cart</button>
            <button class="remove">Remove from the cart</button>
        </div>
    </div>
    <script src="logic.js"></script>
</body>
</html>
